name: Flask Docker CI

on:
  push:
    branches:
      - main

jobs:
  build-test-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/flask-demo-4:v6-${GITHUB_SHA::7} \
          ./flaskapp

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/flask-demo-4:v6-${GITHUB_SHA::7}

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update Kubernetes Manifest
        run: |
          yq -i \
          '.spec.template.spec.containers[0].image = "nikhilj1402/flask-demo-4:v6-'${GITHUB_SHA::7}'"' \
          k8s/py-app.yml

      - name: Commit Updated Manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add k8s/py-app.yml

          git diff --cached --quiet || \
          git commit -m "Deploy v6-${GITHUB_SHA::7}"

      - name: Push Manifest
        run: |
          git push origin main
name: Flask Docker CI

on:
    push:
        branches:
            - main


env:
    IMAGE_NAME: flask-demo

jobs:

    build-test-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Build Docker Image 
              run: "docker build -t nikhilj1402/flaskdemo:$GITHUB_SHA ./flaskapp"

            - name: Login to docker hub
              uses: docker/login-action@v3
              with:
                username: "${{ secrets.DOCKER_USERNAME }}"
                password: "${{ secrets.DOCKER_PASSWORD }}"

            - name: push image to docker hub
              run: "docker push ${{ secrets.DOCKER_USERNAME }}/flaskdemo:${{ github.sha }}"

            - name: install yq
              run: |
               sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq 
               sudo chmod +x /usr/local/bin/yq 
               yq --version

            - name: Update Image in Kubernetes Manifest 
              run: | 
               yq -i ' .spec.template.spec.containers[0].image = "nikhilj1402/flaskdemo:${{ github.sha }}" 
               ' k8s/py-app.yaml



